name: Bug report
description: Report a firmware, UI, build, or runtime bug.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What went wrong?
      placeholder: Main START did not start the motor...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Exact steps, mode, settings, and what was connected.
      placeholder: |
        1. Boot firmware v2.0.7
        2. Open Main
        3. Press START
    validations:
      required: true
  - type: input
    id: firmware
    attributes:
      label: Firmware version
      placeholder: v2.0.7
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostics / logs
      description: Include serial output or Diagnostics screen event log if available.
      placeholder: |
        MOTION BLOCK = NO
        ESTOP GPIO34 = HIGH OK
        Event log: START CONT...
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true
