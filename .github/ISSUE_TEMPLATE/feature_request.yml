name: Feature request
description: Suggest a firmware, UI, documentation, or hardware-support improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What should this improve for the operator or builder?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the change you want.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Firmware logic
        - UI / LVGL screen
        - Motor control
        - Safety
        - Wiring / hardware
        - Documentation
        - Build / release process
    validations:
      required: true
