name: PlatformIO CI

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  native-tests:
    name: Native Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install PlatformIO Core
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade platformio

      - name: Cache PlatformIO packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/.cache
            ~/.platformio/packages
            ~/.platformio/platforms
          key: pio-${{ runner.os }}-${{ hashFiles('platformio.ini', 'sdkconfig.defaults', 'default_16MB.csv') }}
          restore-keys: |
            pio-${{ runner.os }}-

      - name: Run native tests
        run: pio test -e native

  firmware-build:
    name: ESP32-P4 Release Build
    runs-on: ubuntu-latest
    needs: native-tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install PlatformIO Core
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade platformio

      - name: Cache PlatformIO packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/.cache
            ~/.platformio/packages
            ~/.platformio/platforms
          key: pio-${{ runner.os }}-${{ hashFiles('platformio.ini', 'sdkconfig.defaults', 'default_16MB.csv') }}
          restore-keys: |
            pio-${{ runner.os }}-

      - name: Build release firmware
        run: pio run -e esp32p4-release

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: tig-rotator-esp32p4-firmware
          path: |
            .pio/build-fw/esp32p4-release/*.bin
            .pio/build-fw/esp32p4-release/*.elf
          if-no-files-found: error
