name: Release Firmware

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build and Publish Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install PlatformIO Core
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade platformio

      - name: Cache PlatformIO packages
        uses: actions/cache@v5
        with:
          path: |
            ~/.platformio/.cache
            ~/.platformio/packages
            ~/.platformio/platforms
          key: pio-${{ runner.os }}-${{ hashFiles('platformio.ini', 'sdkconfig.defaults', 'default_16MB.csv') }}
          restore-keys: |
            pio-${{ runner.os }}-

      - name: Run native tests
        run: pio test -e native

      - name: Build release firmware
        run: pio run -e esp32p4-release

      - name: Prepare release assets
        run: |
          set -euo pipefail
          mkdir -p release
          FW_BIN="$(ls -t .pio/build-fw/esp32p4-release/fw_*.bin | head -n1)"
          cp "$FW_BIN" "release/firmware-${GITHUB_REF_NAME}.bin"
          cp .pio/build-fw/esp32p4-release/bootloader.bin "release/bootloader-${GITHUB_REF_NAME}.bin"
          cp .pio/build-fw/esp32p4-release/partitions.bin "release/partitions-${GITHUB_REF_NAME}.bin"
          cat > release/flash-command.txt <<EOF
          Recommended flashing:

            pio run -e esp32p4-release --target upload --upload-port COM5

          Included files:
            firmware-${GITHUB_REF_NAME}.bin
            bootloader-${GITHUB_REF_NAME}.bin
            partitions-${GITHUB_REF_NAME}.bin

          Prefer PlatformIO upload because it uses the board and partition offsets from platformio.ini.
          EOF

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" release/* \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
            --verify-tag
