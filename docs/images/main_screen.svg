<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" width="800" height="480" role="img" aria-labelledby="title desc">
  <title id="title">TIG Rotator main screen</title>
  <desc id="desc">SCREEN_MAIN layout matching screen_main.cpp: header status, side controls, center RPM gauge, pulse quick controls, pedal button, start and stop action bar.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#070707"/>
      <stop offset="1" stop-color="#020202"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#171717"/>
      <stop offset="1" stop-color="#101010"/>
    </linearGradient>
    <linearGradient id="active" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#251C00"/>
      <stop offset="1" stop-color="#120E00"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <style>
      .mono { font-family: "Montserrat", "Segoe UI", Arial, sans-serif; }
      .hdr { font-size: 16px; font-weight: 700; letter-spacing: 1.3px; }
      .small { font-size: 12px; }
      .body { font-size: 14px; }
      .btnText { font-size: 16px; font-weight: 700; letter-spacing: 0.8px; }
      .dim { fill: #666666; }
      .text { fill: #AFAFAF; }
      .vdim { fill: #343434; }
      .accent { fill: #FF9500; }
      .green { fill: #00C853; }
      .red { fill: #FF1744; }
      .panel { fill: url(#panel); stroke: #303030; stroke-width: 1; }
      .panelActive { fill: url(#active); stroke: #FF9500; stroke-width: 2; }
      .panelDanger { fill: #1A0A0A; stroke: #FF1744; stroke-width: 2; }
      .hairline { stroke: #1B1B1B; stroke-width: 1; }
      .guide { stroke: #222222; stroke-width: 1; stroke-dasharray: 3 5; opacity: 0.6; }
    </style>
  </defs>

  <rect width="800" height="480" fill="url(#bg)"/>
  <rect x="0" y="0" width="800" height="30" fill="#090909"/>
  <line x1="0" y1="30" x2="800" y2="30" class="hairline"/>

  <text x="16" y="21" class="mono hdr accent">TIG-ROTATOR</text>
  <text x="160" y="21" class="mono body green">IDLE</text>
  <text x="270" y="21" class="mono body dim">SRC POT</text>
  <text x="780" y="21" class="mono body green" text-anchor="end">READY</text>

  <line x1="186" y1="36" x2="186" y2="410" class="guide"/>
  <line x1="614" y1="36" x2="614" y2="410" class="guide"/>
  <line x1="0" y1="414" x2="800" y2="414" class="hairline"/>

  <g id="left-controls" filter="url(#softShadow)">
    <rect x="8" y="36" width="170" height="72" rx="4" class="panel"/>
    <text x="93" y="80" class="mono btnText text" text-anchor="middle">JOG</text>

    <rect x="8" y="118" width="170" height="72" rx="4" class="panelActive"/>
    <text x="93" y="160" class="mono btnText accent" text-anchor="middle">CW</text>

    <rect x="8" y="200" width="170" height="72" rx="4" class="panel"/>
    <text x="93" y="244" class="mono btnText text" text-anchor="middle">PULSE</text>
  </g>

  <g id="right-controls" filter="url(#softShadow)">
    <rect x="622" y="36" width="170" height="72" rx="4" class="panel"/>
    <text x="707" y="80" class="mono btnText text" text-anchor="middle">STEP</text>

    <rect x="622" y="118" width="170" height="72" rx="4" class="panel"/>
    <text x="707" y="160" class="mono btnText text" text-anchor="middle">3-2-1</text>

    <rect x="622" y="200" width="170" height="72" rx="4" class="panel"/>
    <text x="707" y="244" class="mono btnText text" text-anchor="middle">MENU</text>

    <rect x="622" y="280" width="170" height="72" rx="4" class="panel"/>
    <text x="707" y="322" class="mono btnText text" text-anchor="middle">PEDAL</text>
    <text x="707" y="342" class="mono small vdim" text-anchor="middle">GPIO33 / ADS1115</text>
  </g>

  <g id="gauge">
    <circle cx="400" cy="205" r="116" fill="#050505" opacity="0.65"/>
    <path d="M 269.9 335.1 A 184 184 0 1 1 530.1 335.1"
          fill="none" stroke="#111111" stroke-width="14" stroke-linecap="round"/>
    <path d="M 269.9 335.1 A 184 184 0 0 1 239.0 116.0"
          fill="none" stroke="#1C1C1C" stroke-width="14" stroke-linecap="round"/>
    <path d="M 274.1 330.9 A 178 178 0 0 1 222.0 205.0"
          fill="none" stroke="#FF9500" stroke-width="10" stroke-linecap="round"/>

    <g opacity="0.9">
      <line x1="400" y1="352" x2="400" y2="366" stroke="#2A2A2A" stroke-width="2"/>
      <line x1="286" y1="302" x2="275" y2="313" stroke="#2A2A2A" stroke-width="2"/>
      <line x1="514" y1="302" x2="525" y2="313" stroke="#2A2A2A" stroke-width="2"/>
    </g>

    <g transform="translate(400,181) scale(1.296875)">
      <text x="0" y="0" class="mono accent" font-size="40" font-weight="800" text-anchor="middle" dominant-baseline="central">0.50</text>
    </g>
    <text x="400" y="247" class="mono dim" font-size="24" text-anchor="middle" letter-spacing="2">RPM</text>
    <text x="400" y="344" class="mono small vdim" text-anchor="middle">Pot controls target RPM on main screen</text>
  </g>

  <g id="pulse-quick-controls">
    <text x="182" y="312" class="mono body dim" letter-spacing="0.5">ON</text>
    <rect x="10" y="290" width="44" height="44" rx="4" class="panel"/>
    <text x="32" y="318" class="mono" font-size="22" fill="#AAAAAA" text-anchor="middle">-</text>
    <text x="89" y="318" class="mono" font-size="24" fill="#C8C8C8" text-anchor="middle">0.5s</text>
    <rect x="124" y="290" width="44" height="44" rx="4" class="panel"/>
    <text x="146" y="318" class="mono" font-size="22" fill="#AAAAAA" text-anchor="middle">+</text>

    <text x="182" y="362" class="mono body dim" letter-spacing="0.5">OFF</text>
    <rect x="10" y="340" width="44" height="44" rx="4" class="panel"/>
    <text x="32" y="368" class="mono" font-size="22" fill="#AAAAAA" text-anchor="middle">-</text>
    <text x="89" y="368" class="mono" font-size="24" fill="#C8C8C8" text-anchor="middle">0.5s</text>
    <rect x="124" y="340" width="44" height="44" rx="4" class="panel"/>
    <text x="146" y="368" class="mono" font-size="22" fill="#AAAAAA" text-anchor="middle">+</text>
  </g>

  <g id="bottom-bar" filter="url(#softShadow)">
    <rect x="4" y="420" width="392" height="56" rx="4" class="panel"/>
    <text x="200" y="455" class="mono btnText text" text-anchor="middle">&gt; START</text>

    <rect x="404" y="420" width="392" height="56" rx="4" class="panelDanger"/>
    <text x="600" y="455" class="mono btnText red" text-anchor="middle">X STOP</text>
  </g>
</svg>
