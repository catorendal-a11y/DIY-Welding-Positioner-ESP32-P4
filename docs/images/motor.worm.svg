<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 520" width="100%" height="100%">

  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.15"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2c3e50" />
    </marker>
  </defs>

  <style>
    @keyframes spinCW {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes spinCCW {
      from { transform: rotate(0deg); }
      to { transform: rotate(-360deg); }
    }
    
    #rotate-small {
      animation: spinCW 4s linear infinite;
      transform-origin: 0px 0px;
    }
    
    #rotate-large {
      animation: spinCCW 13.3s linear infinite;
      transform-origin: 0px 0px;
    }

    .title { font-family: 'Inter', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 22px; font-weight: 700; fill: #e6edf3; letter-spacing: -0.5px; }
    .label-main { font-family: 'Inter', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 14px; font-weight: 700; fill: #e6edf3; text-transform: uppercase; letter-spacing: 0.5px; }
    .label-sub { font-family: 'Inter', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 13px; fill: #8b949e; }
    .chip { font-family: 'Inter', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 13px; font-weight: 700; fill: #fff; }
  </style>

  <!-- Bakgrunn -->
  <rect width="100%" height="100%" fill="#0d1117" rx="6" stroke="#30363d" stroke-width="2"/>

  <!-- Header -->
  <text x="40" y="45" class="title">System Kinematics — Total Ratio ≈ 1:200</text>
  <line x1="40" y1="55" x2="880" y2="55" stroke="#30363d" stroke-width="2"/>

  <!-- Stage Ratio Badges -->
  <rect x="40" y="70" width="120" height="28" rx="14" fill="#2980b9"/>
  <text x="100" y="89" text-anchor="middle" class="chip">Stage 1: 1:60</text>
  
  <rect x="40" y="108" width="170" height="28" rx="14" fill="#c0392b"/>
  <text x="125" y="127" text-anchor="middle" class="chip">Stage 2: 1:3.325</text>


  <!-- ========================================== -->
  <!-- 1. NEMA 23 MOTOR                           -->
  <!-- ========================================== -->
  <g filter="url(#shadow)">
    <rect x="60" y="260" width="120" height="130" rx="6" fill="#111" stroke="#000" stroke-width="2.5"/>
    <line x1="60" y1="285" x2="180" y2="285" stroke="#222" stroke-width="2.5"/>
    <line x1="60" y1="310" x2="180" y2="310" stroke="#222" stroke-width="2.5"/>
    <line x1="60" y1="335" x2="180" y2="335" stroke="#222" stroke-width="2.5"/>
    <line x1="60" y1="360" x2="180" y2="360" stroke="#222" stroke-width="2.5"/>
    <rect x="80" y="270" width="30" height="10" rx="2" fill="#e74c3c"/>
    <rect x="120" y="270" width="30" height="10" rx="2" fill="#3498db"/>
  </g>


  <!-- ========================================== -->
  <!-- 2. WORM GEAR HOUSING                       -->
  <!-- ========================================== -->
  <g filter="url(#shadow)">
    <rect x="180" y="150" width="140" height="220" rx="10" fill="#dcdcdc" stroke="#000" stroke-width="2.5"/>
    <circle cx="200" cy="170" r="5" fill="#aaa" stroke="#000" stroke-width="1.5"/>
    <circle cx="300" cy="170" r="5" fill="#aaa" stroke="#000" stroke-width="1.5"/>
    <circle cx="200" cy="350" r="5" fill="#aaa" stroke="#000" stroke-width="1.5"/>
    <circle cx="300" cy="350" r="5" fill="#aaa" stroke="#000" stroke-width="1.5"/>
  </g>

  <!-- Adapter plate -->
  <rect x="175" y="245" width="15" height="50" fill="#eee" stroke="#000" stroke-width="1.5"/>


