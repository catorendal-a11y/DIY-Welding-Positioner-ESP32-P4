<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, orientation=landscape">
    <meta name="theme-color" content="#050505">
    <title>TIG Rotator Web Panel</title>
    <style>
        /* Exact color matches from ui_all_screens.svg */
        :root {
            --bg-main: #050505;
            --btn-bg: #121212;
            --btn-border: #333333;
            --text-main: #FFFFFF;
            --text-dim: #444444;
            --cyan: #00E5FF;
            --green: #00E676;
            --red: #FF1744;
            --amber: #FF9100;
            --purple: #D500F9;
            --teal: #1DE9B6;
            --dark-cyan-bg: #0c1a1c;
        }

        body { 
            background-color: var(--bg-main); 
            color: var(--text-main); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; width: 100vw; overflow: hidden;
            user-select: none; -webkit-user-select: none;
        }

        /* Responsive landscape container matching 800x480 aspect ratio */
        #app-root {
            position: relative;
            width: 100%; height: 100%;
            max-width: 800px; max-height: 480px;
            background: var(--bg-main);
            border: 2px solid var(--btn-border);
            border-radius: 12px;
            box-sizing: border-box;
            overflow: hidden;
        }

        .screen {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            display: none; box-sizing: border-box; padding: 10px;
        }
        .screen.active { display: block; }
        
        /* Typography */
        h1, h2, h3 { margin: 0; font-weight: bold; }
        .title { margin-top: 5px; font-size: 16px; color: var(--text-dim); text-align: center; width: 100%; position: absolute; }
        
        /* Grid Layouts for Main Screen */
        .grid-left { position: absolute; left: 20px; top: 90px; display: flex; flex-direction: column; gap: 15px; }
        .grid-right { position: absolute; right: 20px; top: 90px; display: flex; flex-direction: column; gap: 15px; }
        .grid-bottom { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 15px; }

        /* Buttons matching SVG exact styling */
        .btn {
            background: var(--btn-bg); border: 1px solid var(--btn-border);
            color: var(--text-dim); border-radius: 8px; width: 80px; height: 45px;
            font-size: 14px; font-weight: bold; \63\75\72\73\6f\72: pointer; transition: 0.1s;
            display: flex; justify-content: center; align-items: center; outline: none;
        }
        .btn:active { transform: scale(0.95); background: #1a1a1a; }
        
        /* Button States */
        .btn.active-cyan { background: var(--dark-cyan-bg); border: 2px solid var(--cyan); color: var(--text-main); }
        .btn.active-green { background: rgba(0,230,118,0.1); border: 2px solid var(--green); color: var(--green); }
        .btn.active-red { border: 2px solid var(--red); color: var(--red); }
        .btn.active-amber { background: rgba(255,145,0,0.1); border: 2px solid var(--amber); color: var(--amber); }

        /* Wide buttons for menus */
        .btn-wide {
            background: var(--btn-bg); border: 1px solid var(--btn-border);
            color: var(--text-dim); border-radius: 6px; width: 350px; height: 50px;
            font-size: 16px; font-weight: bold; \63\75\72\73\6f\72: pointer; transition: 0.1s;
            display: flex; justify-content: space-between; align-items: center; padding: 0 20px;
            margin: 10px auto;
        }
        .btn-wide:active { border-color: var(--cyan); }
        .btn-wide.selected-pulse { border-color: var(--purple); color: var(--purple); }
        .btn-wide.selected-step { border-color: var(--teal); color: var(--teal); }
        .btn-wide.selected-timer { border-color: var(--cyan); color: var(--cyan); }
        .sub-dim { font-size: 12px; color: var(--text-dim); font-weight: normal; }

        /* Status Bar */
        .status-bar { position: absolute; top: 30px; left: 20px; right: 20px; display: flex; justify-content: space-between; }
        .st-left { color: var(--text-dim); font-size: 12px; font-weight: bold;}
        .st-mid { color: var(--cyan); font-size: 14px; font-weight: bold; text-align: center; } /* Will change to green when running */
        .st-right { color: var(--text-dim); font-size: 12px; font-weight: bold;}

        /* Gauge Area */
        .gauge-area {
            position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
            width: 250px; height: 250px; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .gauge-svg { position: absolute; width: 100%; height: 100%; top: 0; left: 0; transform: rotate(135deg); }
        .arc-bg { fill: none; stroke: #111111; stroke-width: 10; stroke-linecap: round; }
        .arc-fg { fill: none; stroke: var(--cyan); stroke-width: 8; stroke-linecap: round; stroke-dasharray: 200 565; transition: 0.1s linear; }
        
        .rpm-val { font-size: 65px; font-weight: bold; color: var(--text-main); margin-top: 10px; z-index: 2; }
        .rpm-lbl { font-size: 14px; font-weight: bold; color: var(--cyan); letter-spacing: 2px; z-index: 2; }
        
        /* Gauge Numbers Match SVG */
        .g-num { position: absolute; font-size: 12px; font-weight: bold; color: var(--text-dim); }
        .gn-0 { bottom: 10px; left: 20px; }
        .gn-2 { top: 70px; left: -10px; }
        .gn-3 { top: -15px; left: 115px; }
        .gn-4 { top: 70px; right: -10px; }
        .gn-6 { bottom: 10px; right: 20px; }

        /* Dynamic Mode Parameter Screen styles matching SVG wireframes */
        .param-screen { border: 2px solid var(--cyan); /* dynamically changed */ }
        .param-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 350px; margin: 50px auto 0; }
        .param-box { background: var(--btn-bg); border: 1px solid var(--btn-border); border-radius: 6px; padding: 15px; text-align: center; }
        .param-box .lbl { font-size: 12px; color: var(--text-dim); font-weight: bold; display: block; margin-bottom: 5px; }
        .param-box .val { font-size: 28px; color: var(--text-main); font-weight: bold; display: block; }
        .param-actions { display: flex; justify-content: center; gap: 15px; margin-top: 30px; }
        .btn-param-action { width: 150px; height: 50px; }

    </style>
</head>
<body>

<div id="app-root">

    <!-- ==============================================
                     SCREEN 1: MAIN
    =================================================== -->
    <div id="screen-main" class="screen active">
        <div class="title">MAIN SCREEN</div>
        
        <div class="status-bar">
            <div class="st-left">TIG ROTATOR</div>
            <div class="st-mid" id="status-mid">IDLE - CONTINUOUS</div>
            <div class="st-right">~ LINK OK</div>
        </div>

        <div class="gauge-area">
            <svg class="gauge-svg" viewBox="0 0 200 200">
                <path class="arc-bg" d="M 40 160 A 85 85 0 1 1 160 160" />
                <path class="arc-fg" id="arcFg" d="M 40 160 A 85 85 0 1 1 160 160" />
            </svg>
            <div class="g-num gn-0">0</div>
            <div class="g-num gn-2">2.0</div>
            <div class="g-num gn-3">3.0</div>
            <div class="g-num gn-4">4.0</div>
            <div class="g-num gn-6">6.0</div>

            <div class="rpm-val" id="rpmText">1.8</div>
            <div class="rpm-lbl">RPM</div>
        </div>

        <div class="grid-left">
            <!-- Exact buttons from SVG -->
            <button class="btn" id="btn-on" onclick="toggleOn()">ON</button>
            <button class="btn" id="btn-stop" onclick="clickStop()">STOP</button>
            <button class="btn" id="btn-jog" onmousedown="clickJog(true)" onmouseup="clickJog(false)" ontouchstart="clickJog(true)" ontouchend="clickJog(false)">JOG</button>
        </div>

        <div class="grid-right">
            <!-- Exact buttons from SVG -->
            <button class="btn active-cyan" id="btn-cw" onclick="setDir('CW')">CW</button>
            <button class="btn" id="btn-ccw" onclick="setDir('CCW')">CCW</button>
            <button class="btn" onclick="showScreen('screen-menu')">MENU</button>
        </div>

        <div class="grid-bottom">
            <button class="btn" style="width: 100px;" onclick="adjustRpm(-0.1)">- RPM</button>
            <button class="btn" style="width: 100px;" onclick="adjustRpm(0.1)">+ RPM</button>
        </div>
    </div>

    <!-- ==============================================
                     SCREEN 2: MENU
    =================================================== -->
    <div id="screen-menu" class="screen">
        <div class="title">MODE SELECTION MENU</div>
        <div style="margin-top: 60px;">
            <button class="btn-wide selected-pulse" onclick="showParamScreen('PULSE')">
                <span style="color:var(--text-main);">► PULSE MODE</span><span class="sub-dim">Tack weld</span>
            </button>
            <button class="btn-wide selected-step" onclick="showParamScreen('STEP')">
                <span style="color:var(--text-main);">► STEP MODE</span><span class="sub-dim">Angle position</span>
            </button>
            <button class="btn-wide selected-timer" onclick="showParamScreen('TIMER')">
                <span style="color:var(--text-main);">► TIMER MODE</span><span class="sub-dim">Timed rotation</span>
            </button>
            <!-- A simpler button to return to continuous -->
            <button class="btn-wide" onclick="setContinuous()">
                <span style="color:var(--text-main);">► CONTINUOUS</span><span class="sub-dim">Standard Mode</span>
            </button>
            <button class="btn-wide" onclick="showScreen('screen-main')" style="margin-top:30px; justify-content:center; border-color:var(--text-dim);">
                <span>← BACK TO MAIN</span>
            </button>
        </div>
    </div>

    <!-- ==============================================
                     DYNAMIC PARAMETER SCREEN
    =================================================== -->
    <!-- Matches Screen 3/4/6 layouts loosely -->
    <div id="screen-param" class="screen param-screen">
        <div class="title" id="param-title" style="color: var(--purple);">PULSE MODE</div>
        <div style="text-align:center; font-weight:bold; font-size:14px; margin-top: 40px;" id="param-status" style="color: var(--purple);">PULSE ACTIVE</div>

        <div class="param-grid">
            <div class="param-box">
                <span class="lbl" id="param-lbl-1">DEGREES</span>
                <span class="val" id="param-val-1">10°</span>
            </div>
            <div class="param-box">
                <span class="lbl" id="param-lbl-2">PAUSE</span>
                <span class="val" id="param-val-2">2.0s</span>
            </div>
        </div>

        <div class="param-actions">
            <!-- Simulated +/- buttons from the SVG mockups -->
            <button class="btn btn-param-action" onclick="alert('Adjust left parameter')">- / +</button>
            <button class="btn btn-param-action" id="param-apply" style="border: 2px solid var(--green); color: var(--green);" onclick="applyAndStart()">▶ START</button>
        </div>
        
        <button class="btn" style="position:absolute; bottom:20px; left:50%; transform:translateX(-50%); width: 200px;" onclick="showScreen('screen-menu')">← MENU</button>
    </div>

</div>

<script>
    const maxArcDash = 534; // 2 * PI * 85 = 534 (total circumference)
    // We want 270 degrees out of 360 = 0.75 * 534 = 400.5. 
    // BUT since we are using stroke-dasharray, setting "dash-length gap-length".
    // A full circle is 534. A 270 arc is 400. 
    const maxDegreeDash = 400; 

    let rpm = 1.8;
    let mode = 'CONTINUOUS';
    let isRunning = false;
    let dir = 'CW';

    // UI Elements
    const arcFg = document.getElementById('arcFg');
    const rpmText = document.getElementById('rpmText');
    const btnOn = document.getElementById('btn-on');
    const btnStop = document.getElementById('btn-stop');
    const btnJog = document.getElementById('btn-jog');
    const btnCw = document.getElementById('btn-cw');
    const btnCcw = document.getElementById('btn-ccw');
    const statusMid = document.getElementById('status-mid');

    function updateRpmDisplay() {
        if (rpm < 0) rpm = 0;
        if (rpm > 6.0) rpm = 6.0;
        rpmText.innerText = rpm.toFixed(1);
        let pct = rpm / 6.0; // max gauge is 6.0 in SVG
        arcFg.style.strokeDasharray = `${pct * maxDegreeDash} 534`;
    }

    function adjustRpm(delta) {
        rpm += delta;
        updateRpmDisplay();
    }

    function setDir(d) {
        dir = d;
        btnCw.className = 'btn';
        btnCcw.className = 'btn';
        if(d === 'CW') btnCw.className = 'btn active-cyan';
        if(d === 'CCW') btnCcw.className = 'btn active-cyan';
    }

    function toggleOn() {
        if(isRunning) return; // Ignore if running
        isRunning = true;
        btnOn.className = 'btn active-green';
        btnStop.className = 'btn';
        statusMid.innerText = 'RUNNING - ' + mode;
        statusMid.style.color = 'var(--green)';
        arcFg.style.stroke = 'var(--green)';
    }

    function clickStop() {
        isRunning = false;
        btnOn.className = 'btn';
        btnStop.className = 'btn active-red';
        setTimeout(() => { if(!isRunning) btnStop.className = 'btn'; }, 300); // flash red
        statusMid.innerText = 'IDLE - ' + mode;
        statusMid.style.color = 'var(--cyan)';
        arcFg.style.stroke = 'var(--cyan)';
    }

    function clickJog(isDown) {
        if(isRunning) return; // Cannot jog while continuous
        if(isDown) {
            btnJog.className = 'btn active-amber';
            statusMid.innerText = 'JOGGING';
            statusMid.style.color = 'var(--amber)';
            arcFg.style.stroke = 'var(--amber)';
        } else {
            btnJog.className = 'btn';
            clickStop();
        }
    }

    // Navigation and Mode Logic
    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function setContinuous() {
        mode = 'CONTINUOUS';
        clickStop();
        showScreen('screen-main');
    }

    function showParamScreen(targetMode) {
        mode = targetMode;
        let pScreen = document.getElementById('screen-param');
        let title = document.getElementById('param-title');
        let status = document.getElementById('param-status');
        let l1 = document.getElementById('param-lbl-1');
        let v1 = document.getElementById('param-val-1');
        let l2 = document.getElementById('param-lbl-2');
        let v2 = document.getElementById('param-val-2');

        if(mode === 'PULSE') {
            pScreen.style.borderColor = 'var(--purple)';
            title.innerText = 'PULSE MODE'; title.style.color = 'var(--purple)';
            status.innerText = 'PULSE ACTIVE'; status.style.color = 'var(--purple)';
            l1.innerText = 'DEGREES'; v1.innerText = '10°';
            l2.innerText = 'PAUSE'; v2.innerText = '2.0s';
        } 
        else if (mode === 'STEP') {
            pScreen.style.borderColor = 'var(--teal)';
            title.innerText = 'STEP MODE'; title.style.color = 'var(--teal)';
            status.innerText = 'STEP ACTIVE'; status.style.color = 'var(--teal)';
            l1.innerText = 'ANGLE'; v1.innerText = '90°';
            l2.innerText = 'CUSTOM'; v2.innerText = '--';
        }
        else if (mode === 'TIMER') {
            pScreen.style.borderColor = 'var(--cyan)';
            title.innerText = 'TIMER MODE'; title.style.color = 'var(--cyan)';
            status.innerText = 'TIMER ACTIVE'; status.style.color = 'var(--cyan)';
            l1.innerText = 'DURATION'; v1.innerText = '00:30';
            l2.innerText = 'SPEED'; v2.innerText = '2.0 RPM';
        }
        showScreen('screen-param');
    }

    function applyAndStart() {
        showScreen('screen-main');
        toggleOn();
    }

    // Init
    updateRpmDisplay();
    window.oncontextmenu = function(e){ e.preventDefault(); e.stopPropagation(); return false; };

</script>
</body>
</html>
