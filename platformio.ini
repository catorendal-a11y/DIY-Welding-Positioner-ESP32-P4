; PlatformIO Project Configuration for TIG Welding Rotator Controller
; Hardware: GUITION JC4880P433 ESP32-P4 4.3" Touch Display Dev Board
; Target: MIPI-DSI display (ST7701S) + LVGL + FastAccelStepper
;
; IMPORTANT: This project uses ESP-IDF native MIPI-DSI panel drivers.
;            LovyanGFX is NOT compatible with MIPI-DSI on ESP32-P4.

[platformio]
default_envs = esp32p4-release

[env]
; Pin to a specific pioarduino release to prevent upstream breakage
platform      = https://github.com/pioarduino/platform-espressif32.git
board         = esp32-p4
framework     = arduino

; Critical Memory Configuration for ESP32-P4 JC4880P433
board_build.flash_size  = 16MB
board_build.partitions  = default_16MB.csv
board_build.filesystem  = littlefs
board_build.psram_type  = opi
board_build.psram_size  = 32MB
board_build.arduino.memory_type = qio_qspi

build_flags =
  -D BOARD_HAS_PSRAM
  -D mcu=esp32p4
  -D CONFIG_ESP_LCD_TOUCH_MAX_POINTS=5
  ; Display controller version flags for ST7701S
  -D ESP_LCD_ST7701_VER_MAJOR=1
  -D ESP_LCD_ST7701_VER_MINOR=0
  -D ESP_LCD_ST7701_VER_PATCH=0
  ; USB-CDC: Required for serial monitor over USB-C on ESP32-P4
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DLV_CONF_INCLUDE_SIMPLE=1
  -I lib
  -I lib/esp_lcd_st7701/priv_include
  ; ESP-IDF private headers for LDO support
  -I ${platformio.packages_dir}/framework-arduinoespressif32-libs/esp32p4_es/include/esp_private
  ; Increase Arduino main loop stack size for MIPI-DSI init
  -DARDUINO_LOOP_STACK_SIZE=32768
  ; ST7701 MIPI-DSI bug workaround
  -DESP_PANEL_DRIVERS_BUS_ENABLE_RGB=1
  ; ISR IRAM-safe flags: prevent PSRAM cache miss in RMT/GPTIMER interrupts
  ; Fixes step pulse timing issues on ESP32-P4 with PSRAM enabled
  -DCONFIG_RMT_ISR_IRAM_SAFE=1
  -DCONFIG_GPTIMER_ISR_IRAM_SAFE=1

lib_deps =
  gin66/FastAccelStepper@^0.33.14
  https://github.com/lvgl/lvgl.git#v9.5.0
  bblanchon/ArduinoJson@^7.4.3

; Upload port (ESP32-P4 uses USB-CDC)
upload_port = COM5
upload_speed = 115200

; Serial monitor uses USB-CDC (not UART 115200)
monitor_speed = 115200

; -----------------------------------------------------------------------------
; PRODUCTION ENVIRONMENT (default for flashing)
; Silent output, maximum performance
; -----------------------------------------------------------------------------
[env:esp32p4-release]
extends = env
build_flags =
  ${env.build_flags}
  -D CORE_DEBUG_LEVEL=0
  -D DEBUG_BUILD=0

; -----------------------------------------------------------------------------
; DEVELOPMENT ENVIRONMENT
; Full ESP-IDF info logging + serial debug output
; -----------------------------------------------------------------------------
[env:esp32p4-debug]
extends = env
build_flags =
  ${env.build_flags}
  -D CORE_DEBUG_LEVEL=3
  -D DEBUG_BUILD=1
