; PlatformIO Project Configuration for TIG Welding Rotator Controller
; Hardware: GUITION JC4880P433 ESP32-P4 4.3" Touch Display Dev Board
; Target: MIPI-DSI display (ST7701S) + LVGL + FastAccelStepper
;
; IMPORTANT: This project uses ESP-IDF native MIPI-DSI panel drivers.
;            LovyanGFX is NOT compatible with MIPI-DSI on ESP32-P4.

[platformio]
default_envs = esp32p4-release
; New tree under .pio/ so builds do not fight a locked .pio/build (Windows WinError 32 on
; bootloader.bin / firmware.bin / partitions.bin from AV, serial tools, or stale handles).
build_dir = .pio/build-fw

; -----------------------------------------------------------------------------
; SHARED ESP32-P4 CONFIGURATION (not inherited by native test env)
; -----------------------------------------------------------------------------
[esp32_common]
; Pin to a specific pioarduino release to prevent upstream breakage
platform      = https://github.com/pioarduino/platform-espressif32.git#55.03.37
board         = esp32-p4
framework     = arduino

; Critical Memory Configuration for ESP32-P4 JC4880P433
board_build.flash_size  = 16MB
board_build.partitions  = default_16MB.csv
board_build.filesystem  = littlefs
board_build.psram_type  = opi
board_build.psram_size  = 32MB
board_build.arduino.memory_type = qio_qspi
; Brownout detector at 2.8V — prevents silent reboot on voltage dips
; (display backlight + motor driver can cause transient drops below 3.3V)
board_build.vdd = 2800

build_flags =
  -D BOARD_HAS_PSRAM
  -D mcu=esp32p4
  -D CONFIG_ESP_LCD_TOUCH_MAX_POINTS=5
  ; Display controller version flags for ST7701S
  -D ESP_LCD_ST7701_VER_MAJOR=1
  -D ESP_LCD_ST7701_VER_MINOR=0
  -D ESP_LCD_ST7701_VER_PATCH=0
  ; USB-CDC: Required for serial monitor over USB-C on ESP32-P4
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DLV_CONF_INCLUDE_SIMPLE=1
  -I lib
  -I lib/esp_lcd_st7701/priv_include
  ; Increase Arduino main loop stack size for MIPI-DSI init
  -DARDUINO_LOOP_STACK_SIZE=32768
  ; ST7701 MIPI-DSI bug workaround
  -DESP_PANEL_DRIVERS_BUS_ENABLE_RGB=1
  ; ISR IRAM-safe flags: prevent PSRAM cache miss in RMT/GPTIMER interrupts
  ; Fixes step pulse timing issues on ESP32-P4 with PSRAM enabled
  -DCONFIG_RMT_ISR_IRAM_SAFE=1
  -DCONFIG_GPTIMER_ISR_IRAM_SAFE=1
  ; WDT timeout: sdkconfig.defaults (do not -D here — conflicts with framework sdkconfig.h)
  ; Fewer warnings from Arduino core, ESP-IDF headers, and LVGL (app code still compiles as C++)
  -Wno-deprecated-declarations
  -Wno-unused-parameter
  -Wno-unused-variable
  -Wno-unused-function
  -Wno-sign-compare
  -Wno-maybe-uninitialized
  -Wno-unused-but-set-variable
  -Wno-missing-field-initializers
  -Wno-unknown-pragmas
  ; Foot pedal per docs/images/Wiring_diagram.v2.svg: ADS1115 @ 0x48 on touch I2C (AIN0 = pedal pot)
  -DENABLE_ADS1115_PEDAL=1

lib_deps =
  ; Step pulse timing is defined inside the library (ESP32: fas_arch/common_esp32.h MIN_CMD_TICKS).
  ; There is no supported -DFAS_MIN_PULSE_WIDTH_TICKS in FastAccelStepper 0.33.x — do not add random -D flags.
  ; DM542T 2.5 us pulse: see docs/HARDWARE_SETUP.md section 3 (DM542T checklist).
  gin66/FastAccelStepper@^0.33.14
  https://github.com/lvgl/lvgl.git#v9.5.0
  bblanchon/ArduinoJson@^7.4.3

; USB-CDC on ESP32-P4 (Device Manager: "USB Serial Device", VID:PID 303A:1001 = Espressif)
upload_port   = COM5
monitor_port  = COM5
upload_speed  = 115200

monitor_speed = 115200

; -----------------------------------------------------------------------------
; PRODUCTION ENVIRONMENT (default for flashing)
; Silent output, maximum performance
; -----------------------------------------------------------------------------
[env:esp32p4-release]
extends = esp32_common
extra_scripts = pre:scripts/pio_pre_unique_bin.py
build_flags =
  ${esp32_common.build_flags}
  -D CORE_DEBUG_LEVEL=0
  -D DEBUG_BUILD=0

; -----------------------------------------------------------------------------
; DEVELOPMENT ENVIRONMENT
; Full ESP-IDF info logging + serial debug output
; -----------------------------------------------------------------------------
[env:esp32p4-debug]
extends = esp32_common
extra_scripts = pre:scripts/pio_pre_unique_bin.py
build_flags =
  ${esp32_common.build_flags}
  -D CORE_DEBUG_LEVEL=3
  -D DEBUG_BUILD=1

; -----------------------------------------------------------------------------
; ON-DEVICE TEST ENVIRONMENT
; Hardware integration tests — flashed to ESP32-P4, results over USB-CDC serial
; Usage: pio test -e esp32p4-test
;        pio test -e esp32p4-test -f test_device_storage
; -----------------------------------------------------------------------------
[env:esp32p4-test]
extends = esp32_common
extra_scripts = pre:scripts/pio_pre_unique_bin.py
test_framework = unity
test_build_src = true
build_src_filter = +<*> -<main.cpp>
test_filter = test_device_*
test_port = COM5
test_speed = 115200
build_flags =
  ${esp32_common.build_flags}
  -D CORE_DEBUG_LEVEL=3
  -D DEBUG_BUILD=1

; -----------------------------------------------------------------------------
; NATIVE TEST ENVIRONMENT
; Pure-logic unit tests — runs on PC, no hardware needed
; Usage: pio test -e native
; -----------------------------------------------------------------------------
[env:native]
platform = native
test_framework = unity
build_flags = -std=c++17
test_build_src = false
test_filter = test_logic, test_screens, test_utils
