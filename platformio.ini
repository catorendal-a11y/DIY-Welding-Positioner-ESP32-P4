; PlatformIO Project Configuration for TIG Welding Rotator Controller
; Hardware: Waveshare/Guition ESP32-P4 4.3" Touch Display Dev Board
; Target: MIPI-DSI display (ST7701S) + LVGL + FastAccelStepper

[env]
platform      = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board         = esp32-p4
framework     = arduino

; Critical Memory Configuration for ESP32-P4
board_build.flash_size  = 16MB
board_build.partitions  = default_16MB.csv
board_build.arduino.memory_type = qio_opi ; Required for precise P4 PSRAM cache operation

build_flags =
  -D BOARD_HAS_PSRAM
  -D mcu=esp32p4
  -D CONFIG_ESP_LCD_TOUCH_MAX_POINTS=5
  -D ESP_LCD_ST7701_VER_MAJOR=1
  -D ESP_LCD_ST7701_VER_MINOR=0
  -D ESP_LCD_ST7701_VER_PATCH=0
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DLV_CONF_INCLUDE_SIMPLE=1
  -I lib
  -I lib/esp_lcd_st7701/priv_include

lib_deps =
  gin66/FastAccelStepper
  lvgl/lvgl@^8.3.0
  bblanchon/ArduinoJson

monitor_speed = 115200
upload_speed = 921600

; -----------------------------------------------------------------------------
; PRODUCTION ENVIRONMENT
; Default environment with debug logging disabled for maximum performance
; -----------------------------------------------------------------------------
[env:esp32p4-release]
extends = env
build_flags = 
  ${env.build_flags}
  -D CORE_DEBUG_LEVEL=0
  -D DEBUG_BUILD=0

; -----------------------------------------------------------------------------
; DEVELOPMENT ENVIRONMENT
; Enables deep ESP-IDF info logging and local serial output
; -----------------------------------------------------------------------------
[env:esp32p4-debug]
extends = env
build_flags = 
  ${env.build_flags}
  -D CORE_DEBUG_LEVEL=3
  -D DEBUG_BUILD=1
