; PlatformIO Project Configuration for TIG Welding Rotator Controller
; Hardware: Waveshare/Guition ESP32-P4 4.3" Touch Display Dev Board
; Target: MIPI-DSI display (ST7701S-class) + LVGL + FastAccelStepper
;
; IMPORTANT: This project uses ESP-IDF native MIPI-DSI panel drivers.
;            LovyanGFX is NOT compatible with MIPI-DSI on ESP32-P4.

[platformio]
default_envs = esp32p4-release

[env]
; Pin to a specific pioarduino release to prevent upstream breakage
platform      = https://github.com/pioarduino/platform-espressif32.git
board         = esp32-p4
framework     = arduino

; Critical Memory Configuration for ESP32-P4
board_build.flash_size  = 16MB
board_build.partitions  = default_16MB.csv
board_build.filesystem  = littlefs
board_build.arduino.memory_type = qio_qspi ; Match available framework libs for P4

build_flags =
  -D BOARD_HAS_PSRAM
  -D mcu=esp32p4
  -D CONFIG_ESP_LCD_TOUCH_MAX_POINTS=5
  ; Display controller version flags for the MIPI-DSI panel driver
  -D ESP_LCD_ST7701_VER_MAJOR=1
  -D ESP_LCD_ST7701_VER_MINOR=0
  -D ESP_LCD_ST7701_VER_PATCH=0
  ; USB-CDC: Required for serial monitor over USB-C on ESP32-P4.
  ; NOTE: Use the USB-CDC port for monitor, NOT UART. If using UART,
  ;       set ARDUINO_USB_CDC_ON_BOOT=0 and connect a USB-UART adapter.
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DLV_CONF_INCLUDE_SIMPLE=1
  -I lib
  -I lib/esp_lcd_st7701/priv_include

lib_deps =
  gin66/FastAccelStepper@^0.31.3
  lvgl/lvgl@^8.3.0
  bblanchon/ArduinoJson

; Serial monitor uses USB-CDC (not UART 115200).
; If using UART adapter, change monitor_port accordingly.
monitor_speed = 115200
upload_speed = 921600

; -----------------------------------------------------------------------------
; PRODUCTION ENVIRONMENT (default for flashing)
; Silent output, maximum performance
; -----------------------------------------------------------------------------
[env:esp32p4-release]
extends = env
build_flags = 
  ${env.build_flags}
  -D CORE_DEBUG_LEVEL=0
  -D DEBUG_BUILD=0

; -----------------------------------------------------------------------------
; DEVELOPMENT ENVIRONMENT
; Full ESP-IDF info logging + serial debug output
; -----------------------------------------------------------------------------
[env:esp32p4-debug]
extends = env
build_flags = 
  ${env.build_flags}
  -D CORE_DEBUG_LEVEL=3
  -D DEBUG_BUILD=1
