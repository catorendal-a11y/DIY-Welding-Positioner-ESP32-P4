<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" width="800" height="480">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <rect width="800" height="480" fill="#050505"/>

  <text x="30" y="35" font-family="sans-serif" font-size="14" fill="#444" font-weight="bold">TIG ROTATOR</text>
  <text x="400" y="35" font-family="sans-serif" font-size="16" fill="#00E676" font-weight="bold" text-anchor="middle">RUNNING</text>
  <text x="770" y="35" font-family="sans-serif" font-size="14" fill="#444" text-anchor="end">24.5V</text>

  <g id="gauge_group">
    <path d="M 286.8 353.1 A 160 160 0 1 1 513.1 353.1" fill="none" stroke="#111" stroke-width="15" stroke-linecap="round"/>

    <path d="M 286.8 353.1 A 160 160 0 0 1 255 295" fill="none" stroke="#00E5FF" stroke-width="12" stroke-linecap="round" filter="url(#glow)"/>

    <g stroke="#222" stroke-width="2">
      <line x1="400" y1="75" x2="400" y2="90" transform="rotate(-45 400 240)" />
      <line x1="400" y1="75" x2="400" y2="90" transform="rotate(0 400 240)" />
      <line x1="400" y1="75" x2="400" y2="90" transform="rotate(45 400 240)" />
      <line x1="400" y1="75" x2="400" y2="90" transform="rotate(-90 400 240)" />
      <line x1="400" y1="75" x2="400" y2="90" transform="rotate(90 400 240)" />
    </g>

    <text x="400" y="260" font-family="sans-serif" font-size="100" fill="#FFFFFF" font-weight="bold" text-anchor="middle">1.8</text>
    <text x="400" y="305" font-family="sans-serif" font-size="22" fill="#00E5FF" font-weight="bold" text-anchor="middle" letter-spacing="3">RPM</text>

    <g font-family="sans-serif" font-size="18" fill="#555" text-anchor="middle" font-weight="bold">
      <text x="262" y="385">0</text>
      <text x="225" y="175">2.0</text> <text x="400" y="55">3.0</text>
      <text x="575" y="175">4.0</text> <text x="538" y="385">6.0</text>
    </g>
  </g>

  <g transform="translate(35, 120)">
    <rect width="130" height="75" rx="12" fill="#0c1a1c" stroke="#00E5FF" stroke-width="2"/>
    <text x="65" y="45" font-family="sans-serif" font-size="20" fill="#FFF" text-anchor="middle" font-weight="bold">ON</text>
  </g>
  <g transform="translate(35, 210)">
    <rect width="130" height="75" rx="12" fill="#121212" stroke="#222" stroke-width="1"/>
    <text x="65" y="45" font-family="sans-serif" font-size="18" fill="#555" text-anchor="middle">STOP</text>
  </g>
  <g transform="translate(35, 300)">
    <rect width="130" height="75" rx="12" fill="#121212" stroke="#222" stroke-width="1"/>
    <text x="65" y="45" font-family="sans-serif" font-size="18" fill="#FFF" text-anchor="middle">JOG</text>
  </g>

  <g transform="translate(635, 120)">
    <rect width="130" height="75" rx="12" fill="#0c1a1c" stroke="#00E5FF" stroke-width="2"/>
    <text x="65" y="45" font-family="sans-serif" font-size="18" fill="#FFF" text-anchor="middle" font-weight="bold">CW ↑</text>
  </g>
  <g transform="translate(635, 210)">
    <rect width="130" height="75" rx="12" fill="#121212" stroke="#222" stroke-width="1"/>
    <text x="65" y="45" font-family="sans-serif" font-size="18" fill="#555" text-anchor="middle">CCW ↓</text>
  </g>
  <g transform="translate(635, 300)">
    <rect width="130" height="75" rx="12" fill="#121212" stroke="#222" stroke-width="1"/>
    <text x="65" y="45" font-family="sans-serif" font-size="18" fill="#FFF" text-anchor="middle">MENU</text>
  </g>

  <g transform="translate(295, 400)">
    <rect width="95" height="55" rx="10" fill="#121212" stroke="#333" stroke-width="1"/>
    <text x="47" y="35" font-family="sans-serif" font-size="16" fill="#FFF" text-anchor="middle">- RPM</text>
  </g>
  <g transform="translate(410, 400)">
    <rect width="95" height="55" rx="10" fill="#121212" stroke="#333" stroke-width="1"/>
    <text x="47" y="35" font-family="sans-serif" font-size="16" fill="#FFF" text-anchor="middle">+ RPM</text>
  </g>
</svg>
